apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-debugger
  namespace: ai-debugger
  labels:
    app: ai-debugger
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ai-debugger
  template:
    metadata:
      labels:
        app: ai-debugger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ai-debugger-sa
      containers:
        - name: api
          image: aayud/ai-production-debugger:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "kubernetes.default.svc"
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
          envFrom:
            - secretRef:
                name: ai-debugger-llm-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ai-debugger
  namespace: ai-debugger
  labels:
    app: ai-debugger
spec:
  type: ClusterIP
  selector:
    app: ai-debugger
  ports:
    - port: 80
      targetPort: 8000
      name: http
