---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-debugger-sa
  namespace: ai-debugger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-debugger-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - events
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-debugger-reader-binding
subjects:
  - kind: ServiceAccount
    name: ai-debugger-sa
    namespace: ai-debugger
roleRef:
  kind: ClusterRole
  name: ai-debugger-reader
  apiGroup: rbac.authorization.k8s.io
